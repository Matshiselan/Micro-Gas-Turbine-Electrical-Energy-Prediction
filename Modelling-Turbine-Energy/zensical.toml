[project]
site_name = "Modelling Turbine Energy"
site_url = "https://Matshiselan.github.io/Modelling-Turbine-Energy/"
repo_url = "https://github.com/Matshiselan/Modelling-Turbine-Energy"
repo_name = "Matshiselan/Modelling-Turbine-Energy"

nav = [
  { "Home" = "index.md" },
  { "Installation" = "installation.md" },
  { "Usage" = "usage.md" },
  { "API Reference" = "api.md" },
]

[[project.theme.palette]]
media = "(prefers-color-scheme: light)"
scheme = "default"
toggle.icon = "material/brightness-7"
toggle.name = "Switch to dark mode"

[[project.theme.palette]]
media = "(prefers-color-scheme: dark)"
scheme = "slate"
toggle.icon = "material/brightness-4"
toggle.name = "Switch to light mode"

[project.plugins.mkdocstrings.handlers.python]
paths = ["src"]
